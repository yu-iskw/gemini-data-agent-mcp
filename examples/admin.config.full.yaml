# yaml-language-server: $schema=../schemas/app-config.v2.schema.json
# Full admin MCP config for generate_analyst_registry_yaml and operator workflows.

api_version: v1beta

server:
  name: gemini-data-agent-admin-mcp
  log_level: INFO
  transport: stdio

agents:
  sales-prod:
    display_name: Sales Production Agent
    description: Production sales analytics data agent.
    data_agent: projects/my-prod-project/locations/us-central1/dataAgents/sales-agent
    tools:
      - query_data_agent
    impersonate_service_account: gda-sales-prod@my-prod-project.iam.gserviceaccount.com
    generation_options:
      generate_query: true
      generate_query_result: true
      generate_natural_language_answer: true
      generate_explanation: true
      generate_disambiguation_question: true

  finance-staging:
    display_name: Finance Staging Agent
    description: Staging finance analytics data agent.
    data_agent: projects/my-staging-project/locations/us-central1/dataAgents/finance-agent
    api_version: v1alpha
    tools:
      - query_data_agent
      - chat_data_agent
      - create_data_agent_conversation
      - list_conversation_messages
    impersonate_service_account: gda-finance-staging@my-staging-project.iam.gserviceaccount.com

  cross-project-api:
    display_name: Cross-project API routing example
    description: Data agent in data-proj; API calls routed via api-proj (client override).
    data_agent: projects/data-proj/locations/us-central1/dataAgents/shared-agent
    client:
      project: api-proj
      location: europe-west1
    tools:
      - query_data_agent
