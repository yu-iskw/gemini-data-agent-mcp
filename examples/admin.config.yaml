# Example admin MCP server configuration (gemini-data-agent-admin-mcp).
# Uses the same AppConfig schema; typically defines the same agents as production for YAML generation and auth inspection.

server:
  name: gemini-data-agent-admin-mcp
  log_level: INFO
  transport: stdio

agents:
  my-agent:
    project: my-gcp-project
    location: us-central1
    api_version: v1beta
    data_agent: projects/my-gcp-project/locations/us-central1/dataAgents/my-agent
    auth:
      mode: adc
    capabilities:
      query_data: true
      chat: false
      raw_passthrough: false
