# Example admin MCP server configuration (gemini-data-agent-admin-mcp).
# Uses the same v2 AppConfig schema as the analyst registry.

api_version: v1beta

server:
  name: gemini-data-agent-admin-mcp
  log_level: INFO
  transport: stdio

agents:
  my-agent:
    data_agent: projects/my-gcp-project/locations/us-central1/dataAgents/my-agent
    tools:
      - query_data_agent
      - chat_data_agent
      - create_data_agent_conversation
      - list_conversation_messages
